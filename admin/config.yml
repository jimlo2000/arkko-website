# =========================================================
# ARKKO 發文後台設定
# 正式模式：文章存進 GitHub 倉庫（jimlo2000/arkko-website），
# 存檔後 Netlify 會自動重新部署，文章就出現在 arkko.tw。
# 登入方式：GitHub 帳號授權（OAuth 設定在 Netlify 的 Access & security）。
# =========================================================
backend:
  name: github
  repo: jimlo2000/arkko-website
  branch: main

# 圖片存進倉庫的 assets/img/uploads；網站上引用路徑為 /assets/img/uploads
media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

locale: "zh_Hant"

site_url: https://arkko.tw
display_url: https://arkko.tw

collections:
  - name: "articles"
    label: "文章"
    label_singular: "文章"
    folder: "content/articles"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - { name: "category", label: "分類", widget: "select", options: [
            { label: "時尚精品（Amber）", value: "fashion" },
            { label: "運動賽事（Jack）", value: "sport" },
            { label: "音樂（Joyce）", value: "music" },
            { label: "Kpop 韓流（Stella）", value: "kpop" },
            { label: "藝術人文（Mandy）", value: "art" },
            { label: "跨領域長文（Arthur）", value: "feature" },
            { label: "Lifestyle（Diana）", value: "lifestyle" },
            { label: "品牌合作（Joanna）", value: "brand" },
            { label: "日本動漫（Willie）", value: "anime" }
          ] }
      - { name: "title", label: "主標", widget: "string", hint: "勾住人的標題" }
      - { name: "subtitle", label: "副標", widget: "string", hint: "補一句脈絡或角度", required: false }
      - { name: "cover", label: "封面圖", widget: "image", required: false, hint: "直接拖照片進來就會上傳" }
      - { name: "coverCredit", label: "圖片來源", widget: "string", required: false, hint: "會顯示在封面圖下方，例如：Getty Images／品牌提供／攝影師名字" }
      - { name: "date", label: "發布時間（也是排程）", widget: "datetime", format: "YYYY.MM.DD HH:mm", date_format: "YYYY.MM.DD", time_format: "HH:mm", hint: "設未來時間＝排程，到時間文章會自己上線；設現在或過去＝馬上發布。網站上只顯示日期。" }
      - { name: "body", label: "內文", widget: "markdown", hint: "在這裡打文章內容，也可以插入圖片" }
